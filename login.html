<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pet Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h2>Pet Care</h2>
        <nav>
            <a href="index.html">Back to Home</a>
        </nav>
    </header>

    <section class="auth-page">
        <div class="form-container">
            <h2>Welcome Back! 🐾</h2>
            <p style="color: #666; margin-bottom: 20px;">Please login to your account to continue.</p>
            
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required><br><br>
                <input type="password" id="loginPassword" placeholder="Password" required><br><br>
                <button type="submit" class="book-btn" style="width: 95%;">Login</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 14px; color: #555;">
                Don't have an account? 
                <a href="signup.html" style="color: #4CAF50; font-weight: bold; text-decoration: none;">Sign up here</a>
            </p>
        </div>
    </section>

    <footer>
        <p>© 2026 Pet Care Website</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
