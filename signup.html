<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Pet Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h2>Pet Care</h2>
        <nav>
            <a href="index.html">Back to Home</a>
        </nav>
    </header>

    <section class="auth-page">
        <div class="form-container">
            <h2>Create an Account 🐶</h2>
            <p style="color: #666; margin-bottom: 20px;">Join our pet-loving community today!</p>
            
            <form id="signupForm">
                <input type="text" id="signupName" placeholder="Full Name" required><br><br>
                <input type="email" id="signupEmail" placeholder="Email Address" required><br><br>
                <input type="password" id="signupPassword" placeholder="Create Password" required minlength="6"><br><br>
                <button type="submit" class="book-btn" style="width: 95%;">Create Account</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 14px; color: #555;">
                Already have an account? 
                <a href="login.html" style="color: #4CAF50; font-weight: bold; text-decoration: none;">Login here</a>
            </p>
        </div>
    </section>

    <footer>
        <p>© 2026 Pet Care Website</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
